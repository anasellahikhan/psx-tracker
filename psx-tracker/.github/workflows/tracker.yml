name: PSX Price Tracker

on:
  schedule:
    # GitHub cron is in UTC. Pakistan time (PKT) = UTC+5.
    - cron: '35 4 * * 1-5'   # 09:35 PKT Mon-Fri (just after market open)
    - cron: '5 5-11 * * 1-5' # 10:05, 11:05 ... 16:05 PKT Mon-Fri
  workflow_dispatch: {}      # allows manual "Run workflow" button for testing

permissions:
  contents: write

concurrency:
  group: psx-tracker
  cancel-in-progress: false

jobs:
  track:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install requests beautifulsoup4 lxml

      - name: Fetch PSX prices
        run: python fetch_prices.py

      - name: Commit and push updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          if git diff --cached --quiet; then
            echo "No new data to commit."
          else
            git commit -m "Price update $(TZ=Asia/Karachi date '+%Y-%m-%d %H:%M PKT')"
            git pull --rebase origin main || true
            git push
          fi
